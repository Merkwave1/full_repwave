# version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: repwave_share_nginx
    restart: always
    ports:
      - "8082:80"
    volumes:
      - ./api:/var/www/html/api
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
      - react
    networks:
      - rep_network
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rep.rule=Host(`your-domain.example`)"
      - "traefik.http.routers.rep.entrypoints=websecure"
      - "traefik.http.routers.rep.tls.certresolver=cloudflare"
      - "traefik.http.services.rep.loadbalancer.server.port=80"
      - "traefik.docker.network=webproxy"

  react:
    build:
      context: ./website
      dockerfile: Dockerfile
    container_name: repwave_share_react
    restart: always
    volumes:
      - ./website:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    networks:
      - rep_network
    ports:
      - "5173:5173"

  php:
    image: php:8.1-fpm
    container_name: repwave_share_php
    restart: always
    volumes:
      - ./api:/var/www/html/api
    environment:
      - TZ=Africa/Cairo
    networks:
      - rep_network
    command: sh -c "docker-php-ext-install mysqli pdo pdo_mysql && php-fpm"

networks:
  rep_network:
    external: true
    name: repwave_share_network
  proxy:
    external: true
    name: webproxy
